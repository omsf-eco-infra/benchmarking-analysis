name: Build site from PR

on:
  pull_request:
    branches:
      - main
  # SCHEDULE AND WORKFLOW DISPATCH USED FOR TESTING
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"


      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          cache: true

      - name: Install deps
        run: pixi install

      - name: Build WASM
        run: pixi run build

      - name: Make artifact
        shell: bash
        run: tar czf site.tar.gz output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site.tar.gz
          if-no-files-found: error
          retention-days: 1
